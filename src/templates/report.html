{% extends "base.html" %}
{% block title %}Report Found Item{% endblock %}
{% block content %}
<h2><i class="bi bi-camera"></i> Report a Found Item</h2>
<p class="subtitle">Take a photo or upload an image of the found item</p>

<form id="report-form" enctype="multipart/form-data">
  <div class="form-group">
    <label>Photos (up to 3)</label>
    <div class="photo-row" id="photo-slots">
      <label class="photo-slot" id="add-photo-btn">
        <input type="file" accept="image/*" capture="environment" hidden id="photo-input" multiple>
        <i class="bi bi-camera-fill"></i>
        <small>Add Photo</small>
      </label>
    </div>
    <div id="previews" class="photo-row"></div>
  </div>

  <div class="form-group">
    <label for="location">Where was it found?</label>
    <input type="text" id="location" name="location" placeholder="e.g. Terminal 2, Gate B4" required>
  </div>

  <div class="form-group">
    <label for="reported_by">Your name (optional)</label>
    <input type="text" id="reported_by" name="reported_by" placeholder="e.g. John D.">
  </div>

  <button type="submit" class="btn-primary" id="submit-btn">
    <i class="bi bi-cloud-upload"></i> Submit Report
  </button>
</form>

<div id="result" class="hidden"></div>

<div id="more-images" class="alert-warning hidden">
  <i class="bi bi-exclamation-triangle"></i>
  <span id="more-images-msg"></span>
  <p>Please add clearer photos and resubmit.</p>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/report.js') }}"></script>
{% endblock %}
